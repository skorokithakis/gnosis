name: Release please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release:
    needs: release-please
    # Explicit '== true' comparison is required, not a truthy check.
    # release-please emits the literal string "false" through job-level
    # outputs on non-release pushes, and GitHub Actions treats any
    # non-empty string as truthy — so a bare truthy check would run this
    # job on every push to main and fail uploading to an empty tag.
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 is required by goreleaser to inspect git history and
      # resolve the tag being released.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The workflow runs on the main branch, not on the tag ref, so
          # goreleaser cannot detect the current tag automatically. Passing it
          # explicitly via this env var is the supported workaround.
          GORELEASER_CURRENT_TAG: ${{ needs.release-please.outputs.tag_name }}
